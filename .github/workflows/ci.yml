name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Check
        run: poetry run invoke ci-check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Test
        run: poetry run invoke test

  publish:
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.event_name == 'push' && github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            rg.fr-par.scw.cloud/matrix-bot-roll/bot:latest
            rg.fr-par.scw.cloud/matrix-bot-roll/bot:${{ github.ref_name }}

  deploy:
    runs-on: ubuntu-latest
    needs: [publish]
    concurrency:
      group: deploy
      cancel-in-progress: false
    steps:
      - name: Install Scaleway CLI
        run: curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh

      - name: Redeploy container
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          SCW_DEFAULT_REGION: fr-par
        run: |
          container_id=$(scw container container list name=matrix-bot-roll -o json | jq -r '.[0].id')
          scw container container redeploy "$container_id"