name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Check
        run: poetry run invoke ci-check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Test
        run: poetry run invoke test

  publish:
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.event_name == 'push' && github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            rg.fr-par.scw.cloud/matrix-bot-roll/bot:latest
            rg.fr-par.scw.cloud/matrix-bot-roll/bot:${{ github.ref_name }}

  deploy:
    runs-on: ubuntu-latest
    needs: [publish]
    concurrency:
      group: deploy
      cancel-in-progress: false
    steps:
      - name: Redeploy container via Scaleway API
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
        run: |
          container_id=$(curl -sS \
            -H "X-Auth-Token: ${SCW_SECRET_KEY}" \
            "https://api.scaleway.com/containers/v1beta1/regions/fr-par/containers?name=matrix-bot-roll&project_id=${SCW_DEFAULT_PROJECT_ID}" \
            | jq -r '.containers[0].id')

          curl -sS -X POST \
            -H "X-Auth-Token: ${SCW_SECRET_KEY}" \
            "https://api.scaleway.com/containers/v1beta1/regions/fr-par/containers/${container_id}/deploy"